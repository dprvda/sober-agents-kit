# =====================================================================
# .pre-commit-config.yaml — wired by the agent-kit
# =====================================================================
# Install once:
#     pip install pre-commit
#     pre-commit install                 # pre-commit + commit-msg stages
#     pre-commit install --hook-type commit-msg --hook-type post-commit --hook-type pre-push
#
# Every `git commit` then runs the gates below. Silent on pass; blocks the
# commit with a structured report on fail. Authoritative roster lives in
# .agent-kit/gates/run_gates_parallel.py.
#
# All hook ids are prefixed `agent-kit-` so a second kit's pre-commit
# hooks can coexist in this file without colliding.
# =====================================================================

repos:
  - repo: local
    hooks:
      # --- doc + code-discipline gates (2-phase dispatcher) -----------
      - id: agent-kit-gates
        name: agent-kit gates (file-reason, links, doc-freshness, md-size, secrets, AI judge)
        entry: python .agent-kit/gates/run_gates_parallel.py
        language: system
        always_run: true
        pass_filenames: false
        verbose: true

      # --- push-stage guard: force-push / branch-delete block ---------
      # Tool-neutral: fires on `git push` from ANY agent or human clone.
      - id: agent-kit-force-push-block
        name: block force-push + remote branch deletes (all tools)
        entry: python .agent-kit/gates/check_force_push.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      # --- ephemeral context refreshers (gitignored output) ----------
      - id: agent-kit-refresh-history
        name: regenerate .git-history.md (recent commits)
        entry: python .agent-kit/gates/refresh_history.py
        language: system
        stages: [pre-commit, post-commit, post-merge, post-checkout]
        always_run: true
        pass_filenames: false

      - id: agent-kit-refresh-issues
        name: regenerate .gh-issues.md (open GitHub issues, if gh present)
        entry: python .agent-kit/gates/refresh_issues.py
        language: system
        stages: [pre-commit, post-commit, post-merge, post-checkout]
        always_run: true
        pass_filenames: false

      # --- Conventional Commits validator (commit-msg stage) ---------
      - id: agent-kit-commit-msg
        name: Conventional Commits validator (+ optional AI cross-check)
        entry: python .agent-kit/gates/critic_llm_commit.py
        language: system
        stages: [commit-msg]
        pass_filenames: true


      # --- self-defending canary for the doc-freshness gate ----------
      - id: agent-kit-doc-freshness-canary
        name: doc-freshness gate self-test (canary)
        entry: python .agent-kit/gates/test_check_doc_freshness.py
        language: system
        files: '^\.agent-kit/gates/(check_doc_freshness|test_check_doc_freshness|_git_mtime)\.py$'
        pass_filenames: false
